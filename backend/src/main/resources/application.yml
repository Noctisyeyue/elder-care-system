server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: elder-care-system

  # 激活本地配置覆盖敏感信息（application-local.yml 不提交，见 .gitignore）
  # 其他人 clone 后，请新建 application-local.yml 并填入本地真实配置
  profiles:
    active: local

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据库连接信息为本地配置，真值见 application-local.yml
    url: jdbc:mysql://localhost:3306/elder_care_system?serverTimezone=UTC&characterEncoding=utf-8
    username: your-mysql-username
    password: your-mysql-password

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  cache:
    type: redis
    redis:
      time-to-live: 300m
      key-prefix: "CACHE:"
      use-key-prefix: true
      cache-null-values: false

  main:
    allow-circular-references: false

  # Spring AI（LLM 对话，api-key 为敏感信息，真值见 application-local.yml）
  ai:
    openai:
      api-key: your-deepseek-api-key
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.8
      embedding:
        enabled: false

  # 邮件服务（密码为敏感信息，真值见 application-local.yml，勿提交）
  mail:
    protocol: smtp
    host: smtp.qq.com
    username: your-email@qq.com
    password: your-smtp-password
    properties:
      port: 587
      default-encoding: UTF-8
      mail.smtp.ssl.enable: true
      mail.smtp.starttls.enable: true

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.eldercare.system.entity

logging:
  level:
    com.eldercare.system: info
    # 需要排查 SQL 时临时打开下面这行即可：
    # com.eldercare.system.mapper: debug

# 自定义配置
elder-care:
  jwt:
    # JWT 密钥为敏感信息，真值见 application-local.yml
    secret-key: your-jwt-secret-key
    ttl: 72000000
  alioss:
    # OSS 密钥为敏感信息，真值见 application-local.yml
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: neuhealth
    endpoint: oss-cn-beijing.aliyuncs.com

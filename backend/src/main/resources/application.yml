server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: elder-care-system

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/elder_care_system?serverTimezone=UTC&characterEncoding=utf-8
    username: root
    password: 123456

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  cache:
    type: redis
    redis:
      time-to-live: 300m
      key-prefix: "CACHE:"
      use-key-prefix: true
      cache-null-values: false

  main:
    allow-circular-references: false

  # Spring AI（LLM 对话，需自行替换 api-key）
  ai:
    openai:
      api-key: your-deepseek-api-key
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.8
      embedding:
        enabled: false

  # 邮件服务（可选，后续按需启用）
  mail:
    protocol: smtp
    host: smtp.qq.com
    username: your-email@qq.com
    password: your-auth-code
    properties:
      port: 587
      default-encoding: UTF-8
      mail.smtp.ssl.enable: true
      mail.smtp.starttls.enable: true

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.eldercare.system.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.eldercare.system: debug

# 自定义配置
elder-care:
  jwt:
    secret-key: elder-care-system-jwt-secret-key-2026
    ttl: 72000000
  alioss:
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: elder-care-system
    endpoint: oss-cn-beijing.aliyuncs.com
